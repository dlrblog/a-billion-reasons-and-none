<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovedle 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg1: #d0e8f5;
      --bg2: #c2ddef;
      --surface: #eaf4fb;
      --surface2: #f4fafd;
      --border: #aacde6;
      --accent: #1f6fa8;
      --accent2: #155d8e;
      --soft: #4da8d8;
      --text: #183a52;
      --text2: #4a7a9b;
      --correct: #1f6fa8;
      --present: #4da8d8;
      --absent: #8db8cf;
      --key: #c0daea;
      --shadow: rgba(31, 111, 168, 0.14);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text)
    }

    header {
      width: 100%;
      max-width: 520px;
      padding: 1.3rem 1rem .7rem;
      text-align: center;
      border-bottom: 1px solid var(--border)
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: .16em;
      color: var(--accent)
    }

    header p {
      font-size: .72rem;
      color: var(--text2);
      margin-top: .12rem;
      letter-spacing: .05em
    }

    #word-len-tag {
      display: inline-block;
      margin-top: .4rem;
      padding: .2rem .7rem;
      background: #dbeafe;
      border-radius: 99px;
      font-size: .68rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .06em
    }

    #toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(-70px);
      background: var(--accent);
      color: #fff;
      padding: .55rem 1.4rem;
      border-radius: 99px;
      font-size: .82rem;
      font-weight: 700;
      box-shadow: 0 4px 18px var(--shadow);
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 999;
      pointer-events: none;
      white-space: nowrap
    }

    #toast.show {
      transform: translateX(-50%) translateY(0)
    }

    #grid {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 1rem .8rem .4rem;
      width: 100%;
      max-width: 420px;
      align-items: center
    }

    .row {
      display: flex;
      gap: 5px
    }

    .tile {
      width: 52px;
      height: 52px;
      border: 2px solid var(--border);
      border-radius: 9px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--text);
      text-transform: uppercase;
      transition: border-color .1s
    }

    .tile.sm {
      width: 44px;
      height: 44px;
      font-size: 1.3rem
    }

    .tile.filled {
      border-color: var(--accent2)
    }

    .tile.pop {
      animation: pop .1s ease
    }

    @keyframes pop {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.13)
      }

      100% {
        transform: scale(1)
      }
    }

    .tile.flip-correct {
      animation: flip .5s ease forwards;
      --fc: var(--correct)
    }

    .tile.flip-present {
      animation: flip .5s ease forwards;
      --fc: var(--present)
    }

    .tile.flip-absent {
      animation: flip .5s ease forwards;
      --fc: var(--absent)
    }

    @keyframes flip {
      0% {
        transform: rotateX(0);
        background: var(--surface2);
        color: var(--text);
        border-color: var(--border)
      }

      49% {
        transform: rotateX(-90deg);
        background: var(--surface2)
      }

      50% {
        transform: rotateX(-90deg);
        background: var(--fc);
        color: #fff;
        border-color: var(--fc)
      }

      100% {
        transform: rotateX(0);
        background: var(--fc);
        color: #fff;
        border-color: var(--fc)
      }
    }

    .row.shake {
      animation: shake .4s ease
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      20% {
        transform: translateX(-7px)
      }

      40% {
        transform: translateX(7px)
      }

      60% {
        transform: translateX(-4px)
      }

      80% {
        transform: translateX(4px)
      }
    }

    .row.bounce .tile {
      animation: tbounce .06s ease calc(var(--d)*60ms) forwards
    }

    @keyframes tbounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-16px)
      }
    }

    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: .4rem .8rem;
      max-width: 480px;
      width: 100%
    }

    .kb-row {
      display: flex;
      gap: 4px;
      justify-content: center
    }

    .key {
      height: 50px;
      min-width: 30px;
      flex: 1;
      max-width: 40px;
      border-radius: 8px;
      border: none;
      background: var(--key);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .15s;
      box-shadow: 0 2px 5px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .key:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px var(--shadow)
    }

    .key:active {
      transform: translateY(0)
    }

    .key.wide {
      max-width: 56px;
      min-width: 46px;
      font-size: .65rem;
      flex: 1.4
    }

    .key.correct {
      background: var(--correct);
      color: #fff
    }

    .key.present {
      background: var(--present);
      color: #fff
    }

    .key.absent {
      background: var(--absent);
      color: #fff;
      opacity: .65
    }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(185, 220, 242, .6);
      backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center;
      justify-content: center
    }

    .overlay.on {
      display: flex;
      animation: fi .25s ease
    }

    @keyframes fi {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 1.8rem 1.8rem 1.6rem;
      max-width: 350px;
      width: 92%;
      box-shadow: 0 12px 48px var(--shadow);
      animation: su .32s cubic-bezier(.34, 1.4, .64, 1);
      text-align: center
    }

    @keyframes su {
      from {
        opacity: 0;
        transform: translateY(28px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .m-emoji {
      font-size: 2.2rem;
      margin-bottom: .3rem
    }

    .m-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: .2rem
    }

    .m-word {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      margin: .4rem 0 1rem
    }

    /* PHASE: who-q */
    #phase-who {
      animation: fi .3s ease
    }

    .who-q {
      font-size: .85rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .8rem
    }

    .who-btns {
      display: flex;
      gap: .7rem;
      justify-content: center
    }

    .who-btn {
      flex: 1;
      padding: .75rem .5rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s
    }

    .who-btn:hover {
      border-color: var(--accent);
      background: #dbeafe;
      color: var(--accent);
      transform: translateY(-2px)
    }

    .who-btn.correct {
      background: var(--correct) !important;
      color: #fff !important;
      border-color: var(--correct) !important
    }

    .who-btn.wrong {
      background: var(--absent);
      color: #fff;
      border-color: var(--absent)
    }

    /* PHASE: result */
    #phase-result {
      animation: fi .4s ease
    }

    .result-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text2);
      margin-bottom: .6rem
    }

    .bars {
      display: flex;
      gap: .8rem;
      align-items: flex-end;
      justify-content: center;
      height: 68px;
      margin-bottom: .3rem
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
      width: 76px
    }

    .bar-rect {
      width: 46px;
      border-radius: 8px 8px 0 0;
      min-height: 6px;
      transition: height .6s ease
    }

    .bar-rect.d {
      background: var(--accent)
    }

    .bar-rect.r {
      background: var(--soft)
    }

    .bar-name {
      font-size: .65rem;
      font-weight: 700;
      color: var(--text2)
    }

    .bar-num {
      font-size: .75rem;
      font-weight: 800;
      color: var(--text)
    }

    .result-note {
      font-size: .8rem;
      color: var(--text2);
      margin: .5rem 0 .6rem;
      line-height: 1.5
    }

    /* Streak bar */
    .streak-bar {
      display: flex;
      gap: .9rem;
      justify-content: center;
      margin: .4rem 0 .9rem;
      padding: .6rem .8rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border)
    }

    .streak-stat {
      text-align: center
    }

    .streak-num {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1
    }

    .streak-lbl {
      font-size: .6rem;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-top: .15rem
    }

    .play-btn {
      width: 100%;
      padding: .78rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
      transition: all .2s;
      letter-spacing: .05em
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow)
    }
  </style>
</head>

<body>
  <div id="loading-overlay" style="
    display:none;
    position:fixed;inset:0;z-index:9999;
    background:linear-gradient(135deg,#0d1b2a 0%,#1a3a5c 100%);
    flex-direction:column;align-items:center;justify-content:center;
    color:#90cdf4;font-family:inherit;gap:1rem;">
    <div style="font-size:2.5rem;animation:pulse 1.2s ease-in-out infinite;">💙</div>
    <div style="font-size:1rem;letter-spacing:.15em;opacity:.75;">Loading Lovedle…</div>
    <style>
      @keyframes pulse {

        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.25);
        }
      }
    </style>
  </div>

  <div id="toast"></div>

  <header>

  <div id="grid"></div>
  <div id="keyboard"></div>

  <div class="overlay" id="overlay">

      <div id="phase-who">
        <div class="who-q">Who said this word more? 💬</div>
        <div class="who-btns">
          <button class="who-btn" id="btn-d" onclick="window.guess_who('Danvanth')">Danvanth</button>
          <button class="who-btn" id="btn-r" onclick="window.guess_who('Raksha')">Raksha</button>
        </div>

            <div class="bar-num" id="r-num">0</div>

          </div>
        </div>
        <div class="result-note" id="result-note"></div>

        <button class="play-btn" onclick="window.newGame()">Play Again 💙</button>
      </div>
    </div>
  </div>

    const VALID_SETS = {};
    for (const [len, words] of Object.entries(VALID_BY_LEN)) {
      VALID_SETS[len] = new Set(words);
    }

    // ── Streak persistence ─────────────────────────────────────────
    const STREAK_KEY = 'lovedle_streak_v1';

    function loadStreak() {
      try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { streak: 0, best: 0, wins: 0 }; }
      catch (_) { return { streak: 0, best: 0, wins: 0 }; }
    }

    function saveStreak(s) {
      try { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); } catch (_) { }
    }

    function recordResult(won) {
      const s = loadStreak();
      if (won) {
        s.streak += 1;
        s.wins += 1;
        if (s.streak > s.best) s.best = s.streak;
      } else {
        s.streak = 0;
      }
      saveStreak(s);
      return s;
    }

    function renderStreak() {
      const s = loadStreak();
      const el = id => document.getElementById(id);
      if (el('stat-streak')) el('stat-streak').textContent = s.streak;
      if (el('stat-best')) el('stat-best').textContent = s.best;
      if (el('stat-wins')) el('stat-wins').textContent = s.wins;
    }

    // ── Game state ─────────────────────────────────────────────────
    let answer, entry, wordLen, MAX_GUESSES, row, col, curGuess, letterState, over, usedAnswers;

    // ── Boot ───────────────────────────────────────────────────────
    const CACHE_KEY = 'lovedle_answers_v1';
    const CACHE_HOURS = 12;

    async function boot() {
      const loadEl = document.getElementById('loading-overlay');
      loadEl.style.display = 'flex';

      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          try {
            const { data, ts } = JSON.parse(cached);
            const ageH = (Date.now() - ts) / 3_600_000;
            if (ageH < CACHE_HOURS && Array.isArray(data) && data.length) {
              ANSWERS.push(...data);
              loadEl.style.display = 'none';
              init();
              return;
            }
          } catch (_) { }
        }
        const fresh = await fetchAnswers();
        ANSWERS.push(...fresh);
        localStorage.setItem(CACHE_KEY, JSON.stringify({ data: fresh, ts: Date.now() }));
      } catch (err) {
        console.error('Lovedle: failed to load answers', err);
        loadEl.innerHTML = `<div style="text-align:center;color:#fca5a5;">
          <div style="font-size:2rem;">💔</div>
          <div style="margin-top:.5rem;">Couldn't load words.<br>Check your connection and refresh.</div>
        </div>`;
        return;
      }

      loadEl.style.display = 'none';
      init();
    }

    function init() {
      usedAnswers = new Set();
      newGame();
    }

    function newGame() {
      document.getElementById('overlay').classList.remove('on');
      document.getElementById('phase-who').style.display = 'block';
      document.getElementById('phase-result').style.display = 'none';

      // Always ensure answer words are in valid sets
      ANSWERS.forEach(a => {
        if (!VALID_SETS[a.word.length]) VALID_SETS[a.word.length] = new Set();
        VALID_SETS[a.word.length].add(a.word);
      });

      let pool = ANSWERS.filter(a => !usedAnswers.has(a.word));
      if (!pool.length) { usedAnswers.clear(); pool = ANSWERS; }

      const totalW = pool.reduce((s, a) => s + a.total, 0);
      let r = Math.random() * totalW, cum = 0;
      entry = pool[pool.length - 1];
      for (const a of pool) { cum += a.total; if (r <= cum) { entry = a; break; } }

      answer = entry.word;
      wordLen = answer.length;
      MAX_GUESSES = wordLen;
      usedAnswers.add(answer);

      row = 0; col = 0; curGuess = []; letterState = {}; over = false;

      document.getElementById('word-len-tag').textContent = wordLen + '-letter word';
      buildGrid();
      buildKB();
    }

    function buildGrid() {
      const g = document.getElementById('grid');
      g.innerHTML = '';
      const sm = wordLen >= 6;
      for (let r = 0; r < MAX_GUESSES; r++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'row'; rowEl.id = 'row-' + r;
        for (let c = 0; c < wordLen; c++) {
          const t = document.createElement('div');
          t.className = 'tile' + (sm ? ' sm' : '');
          t.id = 't-' + r + '-' + c;
          rowEl.appendChild(t);
        }
        g.appendChild(rowEl);
      }
    }

    const KB_ROWS = [
      ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
      ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
      ['Enter', 'z', 'x', 'c', 'v', 'b', 'n', 'm', '⌫']
    ];

    function buildKB() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      for (const keys of KB_ROWS) {
        const rowEl = document.createElement('div');
        rowEl.className = 'kb-row';
        for (const k of keys) {
          const btn = document.createElement('button');
          btn.className = 'key' + (['Enter', '⌫'].includes(k) ? ' wide' : '');
          btn.textContent = k;
          btn.id = 'k-' + k;
          btn.onclick = () => handle(k);
          rowEl.appendChild(btn);
        }
        kb.appendChild(rowEl);
      }
    }

    function handle(k) {
      if (over) return;
      if (k === '⌫' || k === 'Backspace') deleteLetter();
      else if (k === 'Enter') submit();
      else if (/^[a-zA-Z]$/.test(k)) addLetter(k.toLowerCase());
    }

    function addLetter(l) {
      if (col >= wordLen) return;
      const t = document.getElementById('t-' + row + '-' + col);
      t.textContent = l.toUpperCase();
      t.classList.add('filled');
      t.classList.add('pop');
      setTimeout(() => t.classList.remove('pop'), 120);
      curGuess.push(l); col++;
    }

    function deleteLetter() {
      if (!col) return;
      col--; curGuess.pop();
      const t = document.getElementById('t-' + row + '-' + col);
      t.textContent = ''; t.classList.remove('filled');
    }

    function submit() {
      if (col < wordLen) { shake(); toast('Not enough letters'); return; }
      const g = curGuess.join('');
      const vs = VALID_SETS[wordLen];
      if (!vs || !vs.has(g)) { shake(); toast('Not in word list'); return; }
      const res = evaluate(g);
      reveal(row, res, g, () => {
        updateKB(g, res);
        if (g === answer) {
          over = true;
          bounceRow(row);
          setTimeout(() => showModal(true), 400);
        } else if (row + 1 >= MAX_GUESSES) {
          over = true;
          setTimeout(() => showModal(false), 350);
        }
        row++; col = 0; curGuess = [];
      });
    }

    function evaluate(g) {
      const res = Array(wordLen).fill('absent');
      const ans = answer.split('');
      const used = Array(wordLen).fill(false);
      for (let i = 0; i < wordLen; i++) if (g[i] === ans[i]) { res[i] = 'correct'; used[i] = true; }
      for (let i = 0; i < wordLen; i++) {
        if (res[i] === 'correct') continue;
        for (let j = 0; j < wordLen; j++) {
          if (!used[j] && g[i] === ans[j]) { res[i] = 'present'; used[j] = true; break; }
        }
      }
      return res;
    }

    function reveal(r, res, g, cb) {
      for (let c = 0; c < wordLen; c++) {
        const t = document.getElementById('t-' + r + '-' + c);
        setTimeout(() => t.classList.add('flip-' + res[c]), c * 90);
      }
      setTimeout(cb, wordLen * 90 + 260);
    }

    function updateKB(g, res) {
      const p = { correct: 3, present: 2, absent: 1 };
      for (let i = 0; i < wordLen; i++) {
        const l = g[i], s = res[i];
        if ((p[s] || 0) > (p[letterState[l]] || 0)) letterState[l] = s;
        const k = document.getElementById('k-' + l);
        if (k) { k.classList.remove('correct', 'present', 'absent'); k.classList.add(letterState[l]); }
      }
    }

    function shake() {
      const r = document.getElementById('row-' + row);
      r.classList.add('shake');
      setTimeout(() => r.classList.remove('shake'), 400);
    }

    function bounceRow(r) {
      const rowEl = document.getElementById('row-' + r);
      rowEl.classList.add('bounce');
      for (let c = 0; c < wordLen; c++)
        document.getElementById('t-' + r + '-' + c).style.setProperty('--d', c);
    }

    let toastT = null;
    function toast(msg, dur = 1600) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(() => el.classList.remove('show'), dur);
    }

    function showModal(won) {
      // Record result FIRST (before rendering streak display)
      recordResult(won);

      document.getElementById('m-emoji').textContent = won ? '🎉' : '💙';
      document.getElementById('m-title').textContent = won ? 'god damn' : 'The word was...';
      document.getElementById('m-word').textContent = answer.toUpperCase();

      // Reset who buttons
      document.getElementById('btn-d').className = 'who-btn';
      document.getElementById('btn-r').className = 'who-btn';
      document.getElementById('btn-d').onclick = () => window.guess_who('Danvanth');
      document.getElementById('btn-r').onclick = () => window.guess_who('Raksha');

      document.getElementById('overlay').classList.add('on');
    }

    function guess_who(choice) {
      document.getElementById('btn-d').className =
        'who-btn ' + (entry.whoMore === 'Danvanth' ? 'correct' : (choice === 'Danvanth' ? 'wrong' : ''));
      document.getElementById('btn-r').className =
        'who-btn ' + (entry.whoMore === 'Raksha' ? 'correct' : (choice === 'Raksha' ? 'wrong' : ''));
      document.getElementById('btn-d').onclick = null;
      document.getElementById('btn-r').onclick = null;

      const guessedRight = choice === entry.whoMore;
      setTimeout(() => {
        document.getElementById('phase-who').style.display = 'none';
        showResult(guessedRight);
      }, 550);
    }

    function showResult(guessedRight) {
      const d = entry.Danvanth, r = entry.Raksha, tot = d + r;
      const maxH = 54;
      document.getElementById('d-num').textContent = d + 'x';
      document.getElementById('r-num').textContent = r + 'x';
      document.getElementById('d-bar').style.height = Math.max(6, Math.round(d / tot * maxH)) + 'px';
      document.getElementById('r-bar').style.height = Math.max(6, Math.round(r / tot * maxH)) + 'px';

      const more = entry.whoMore;
      const note = guessedRight
        ? ' You got it! ' + more + ' said "' + answer + '" ' + (more === 'Danvanth' ? d : r) + ' times vs ' + (more === 'Danvanth' ? r : d) + '.'
        : ' It was ' + more + '! They said it ' + (more === 'Danvanth' ? d : r) + ' times, vs ' + (more === 'Danvanth' ? r : d) + '.';
      document.getElementById('result-note').textContent = note;

      // Render streak (already recorded in showModal)
      renderStreak();

      document.getElementById('phase-result').style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      if (e.key === 'Enter') handle('Enter');
      else if (e.key === 'Backspace') handle('⌫');
      else if (/^[a-zA-Z]$/.test(e.key)) handle(e.key);
    });

    // ── Expose to global scope so onclick="" attributes can reach them ──
    // (ES modules are scoped; without this, Play Again and guess buttons don't work)
    window.newGame = newGame;
    window.guess_who = guess_who;

    boot();
  </script>
</body>
