<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Notes · The Private Press</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Departure+Mono&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#e8f3fb;--ink:#0d1f2d;--ink-light:#3a5a72;--ink-faint:#8aafcc;
  --accent:#5b9ec9;--accent-dark:#2a6a96;--paper:#d4eaf7;--paper-dark:#b8d8ef;
  --sidebar-w:280px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--cream);color:var(--ink);font-family:"Newsreader",Georgia,serif;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.6rem;border-bottom:1px solid var(--paper-dark);background:var(--cream);flex-shrink:0;z-index:20}
.topbar-left{display:flex;flex-direction:column;gap:.15rem}
.topbar-title{font-family:"DM Serif Display",serif;font-size:1.1rem;font-style:italic;color:var(--ink)}
.topbar-sub{font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-chip{font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-dark);border:1px solid var(--paper-dark);padding:.28rem .65rem}
.sign-out-btn{font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);border:none;background:none;cursor:pointer;padding:.3rem .4rem;transition:color .15s}
.sign-out-btn:hover{color:var(--ink)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--paper-dark);background:var(--paper);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid var(--paper-dark);flex-shrink:0}
.sidebar-label{font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.new-btn{display:flex;align-items:center;gap:.4rem;font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);border:1px solid var(--paper-dark);background:transparent;padding:.35rem .7rem;cursor:pointer;transition:background .15s,border-color .15s}
.new-btn:hover{background:rgba(255,255,255,.65);border-color:var(--accent)}
.new-btn-icon{font-style:normal;font-size:14px;margin-bottom:1px}
.notes-list{flex:1;overflow-y:auto;padding:.5rem 0;scrollbar-width:none}
.notes-list::-webkit-scrollbar{display:none}
.note-item{padding:.85rem 1.2rem;cursor:pointer;border-bottom:1px solid transparent;transition:background .12s;position:relative}
.note-item:hover{background:rgba(255,255,255,.55)}
.note-item.active{background:var(--cream);border-bottom:1px solid var(--paper-dark)}
.note-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.note-item-title{font-size:.9rem;font-weight:400;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.note-item-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.3rem}
.note-item-date{font-family:"Departure Mono",monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
.note-item-author{font-family:"Departure Mono",monospace;font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.note-item-preview{font-size:.8rem;color:var(--ink-light);margin-top:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.75;font-weight:300}
.sidebar-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;padding:3rem 1.5rem;opacity:.4}
.sidebar-empty-icon{font-size:1.5rem}
.sidebar-empty-text{font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);text-align:center}

/* EDITOR */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
.editor-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;opacity:.35;pointer-events:none}
.editor-empty-icon{font-size:2.2rem}
.editor-empty-text{font-family:"Departure Mono",monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint)}
.editor-inner{display:none;flex-direction:column;flex:1;overflow:hidden}
.editor-inner.visible{display:flex}

/* TOOLBAR */
.editor-toolbar{display:flex;align-items:center;gap:.6rem;padding:.75rem 1.8rem;border-bottom:1px solid var(--paper-dark);flex-shrink:0;flex-wrap:wrap}
.img-upload-btn{display:flex;align-items:center;gap:.5rem;font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-light);border:1px solid var(--paper-dark);background:transparent;padding:.38rem .8rem;cursor:pointer;transition:background .15s,border-color .15s}
.img-upload-btn:hover:not(:disabled){background:var(--paper);border-color:var(--accent)}
.img-upload-btn:disabled{opacity:.4;cursor:not-allowed}
.img-upload-btn .icon{font-style:normal}
.upload-progress{display:none;align-items:center;gap:.5rem;font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.upload-progress.visible{display:flex}
.spinner{width:12px;height:12px;border:1.5px solid var(--paper-dark);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.save-btn{font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--cream);border:none;padding:.42rem 1.1rem;cursor:pointer;transition:background .15s,opacity .15s}
.save-btn:hover{background:var(--accent-dark)}
.save-btn:disabled{opacity:.35;cursor:default}
.saved-tick{font-family:"Departure Mono",monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);opacity:0;transition:opacity .3s}
.saved-tick.show{opacity:1}
.delete-btn{font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);border:1px solid var(--paper-dark);background:transparent;padding:.42rem .8rem;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.delete-btn:hover{color:#c94040;border-color:#c94040;background:rgba(201,64,64,.06)}

/* TITLE */
.editor-title-wrap{padding:2rem 2.5rem .8rem;border-bottom:1px solid var(--paper-dark);flex-shrink:0}
input.note-title{width:100%;font-family:"DM Serif Display",serif;font-size:1.9rem;font-style:italic;color:var(--ink);border:none;outline:none;background:transparent;line-height:1.2}
input.note-title::placeholder{color:var(--ink-faint);font-style:italic}
.note-meta-line{margin-top:.55rem;font-family:"Departure Mono",monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);display:flex;gap:1.4rem}

/* BLOCK EDITOR */
.editor-body-wrap{flex:1;overflow-y:auto;padding:1.6rem 2.5rem 4rem;scrollbar-width:none}
.editor-body-wrap::-webkit-scrollbar{display:none}

.block-editor{outline:none;min-height:100%}

/* text block */
.block-text{
  outline:none;
  min-height:1.85em;
  font-family:"Newsreader",Georgia,serif;
  font-size:1.02rem;
  line-height:1.85;
  color:var(--ink);
  font-weight:300;
  white-space:pre-wrap;
  word-break:break-word;
  caret-color:var(--ink);
}
.block-text:empty::before{
  content:attr(data-ph);
  color:var(--ink-faint);
  font-style:italic;
  pointer-events:none;
}
.block-text + .block-text{margin-top:0}

/* image block */
.block-image{
  display:flex;
  align-items:flex-start;
  gap:.6rem;
  padding:.4rem 0;
  position:relative;
}
.block-image img{
  display:block;
  max-width:100%;
  border:1px solid var(--paper-dark);
  border-radius:1px;
}
.block-image-controls{
  display:flex;
  flex-direction:column;
  gap:.3rem;
  opacity:0;
  transition:opacity .15s;
  flex-shrink:0;
}
.block-image:hover .block-image-controls{opacity:1}
.img-ctrl-btn{
  font-family:"Departure Mono",monospace;
  font-size:9px;
  width:22px;
  height:22px;
  display:flex;align-items:center;justify-content:center;
  background:var(--paper);
  border:1px solid var(--paper-dark);
  color:var(--ink-light);
  cursor:pointer;
  transition:background .12s,color .12s;
  flex-shrink:0;
}
.img-ctrl-btn:hover{background:var(--paper-dark);color:var(--ink)}
.img-ctrl-btn.remove:hover{background:rgba(201,64,64,.1);color:#c94040;border-color:#c94040}

/* confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,45,.35);z-index:50;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--cream);border:1px solid var(--paper-dark);padding:2rem 2.2rem;max-width:340px;width:90%;display:flex;flex-direction:column;gap:1.2rem}
.confirm-title{font-family:"DM Serif Display",serif;font-size:1.15rem;font-style:italic;color:var(--ink)}
.confirm-text{font-size:.9rem;line-height:1.75;color:var(--ink-light)}
.confirm-btns{display:flex;gap:.7rem;justify-content:flex-end}
.btn-cancel{font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);border:1px solid var(--paper-dark);background:transparent;padding:.42rem .9rem;cursor:pointer;transition:color .15s}
.btn-cancel:hover{color:var(--ink)}
.btn-confirm-del{font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:#e8f3fb;border:none;background:#c94040;padding:.42rem .9rem;cursor:pointer;transition:background .15s}
.btn-confirm-del:hover{background:#a33030}

/* back btn (mobile) */
.back-btn{display:none;font-family:"Departure Mono",monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);border:none;background:none;cursor:pointer;padding:.38rem 0;transition:color .15s;align-items:center;gap:.4rem}
.back-btn:hover{color:var(--ink)}
@media(max-width:640px){
  .sidebar{width:100%;position:absolute;top:0;left:0;bottom:0;right:0;z-index:10;transform:translateX(0);transition:transform .25s}
  .sidebar.hidden-mobile{transform:translateX(-100%)}
  .editor{position:absolute;top:0;left:0;right:0;bottom:0}
  .back-btn{display:flex!important}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Notes</span>
    <span class="topbar-sub">Private · Just two</span>
  </div>
  <div class="topbar-right">
    <span class="user-chip" id="userChip">—</span>
    <button class="sign-out-btn" onclick="signOut()">sign out</button>
  </div>
</header>

<div class="main" id="mainLayout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">All notes</span>
      <button class="new-btn" onclick="newNote()"><em class="new-btn-icon">+</em> New</button>
    </div>
    <div class="notes-list" id="notesList">
      <div class="sidebar-empty" id="sidebarEmpty">
        <span class="sidebar-empty-icon">✦</span>
        <span class="sidebar-empty-text">No notes yet.<br>Start writing.</span>
      </div>
    </div>
  </nav>

  <!-- EDITOR -->
  <div class="editor" id="editor">
    <div class="editor-empty" id="editorEmpty">
      <span class="editor-empty-icon">✦</span>
      <span class="editor-empty-text">Select or create a note</span>
    </div>
    <div class="editor-inner" id="editorInner">
      <div class="editor-toolbar">
        <button class="back-btn" id="backBtn" onclick="showSidebarMobile()">← Back</button>
        <button class="img-upload-btn" id="imgUploadBtn" onclick="triggerImagePick()" title="Attach image">
          <em class="icon">📎</em> Add Image
        </button>
        <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="handleImagePick(this)">
        <div class="upload-progress" id="uploadProgress">
          <div class="spinner"></div><span>Uploading…</span>
        </div>
        <div class="toolbar-right">
          <span class="saved-tick" id="savedTick">✓ Saved</span>
          <button class="delete-btn" id="deleteBtn" onclick="confirmDelete()">Delete</button>
          <button class="save-btn" id="saveBtn" onclick="saveNote()">Save</button>
        </div>
      </div>
      <div class="editor-title-wrap">
        <input class="note-title" id="noteTitle" type="text" placeholder="Title…" maxlength="120"/>
        <div class="note-meta-line" id="noteMeta"></div>
      </div>
      <div class="editor-body-wrap">
        <div class="block-editor" id="blockEditor"></div>
      </div>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete this note?</div>
    <div class="confirm-text">This can't be undone. The note will be removed for both of you.</div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" onclick="deleteNote()">Delete</button>
    </div>
  </div>
</div>

<script type="module">
// ── CONFIG (injected at deploy time) ─────────────────────────────────────────
const GITHUB_TOKEN  = '%%NOTES_GITHUB_PAT%%';
const GITHUB_REPO   = '%%NOTES_GITHUB_REPO%%';
const GITHUB_BRANCH = 'main';

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, query, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "%%FIREBASE_API_KEY%%",
  authDomain:        "%%FIREBASE_AUTH_DOMAIN%%",
  projectId:         "%%FIREBASE_PROJECT_ID%%",
  storageBucket:     "%%FIREBASE_STORAGE_BUCKET%%",
  messagingSenderId: "%%FIREBASE_MESSAGING_SENDER_ID%%",
  appId:             "%%FIREBASE_APP_ID%%"
};

// ── AUTH ─────────────────────────────────────────────────────────────────────
const currentUser = sessionStorage.getItem('notesUser');
if (!currentUser) window.location.replace('index.html');
document.getElementById('userChip').textContent = currentUser;

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const NOTES_COL = 'notes';

// ── BLOCK EDITOR ─────────────────────────────────────────────────────────────
// Blocks: [{id, type:"text"|"image", content?:"", url?:"", width?:200}]
class BlockEditor {
  constructor(container, onChange) {
    this.container = container;
    this.onChange  = onChange;
    this.blocks    = [];
    this._uid      = 0;
    this.lastFocusedIdx = -1;
    this._setup();
  }

  _id() { return 'b' + (++this._uid); }

  _setup() {
    // clicking the empty area below blocks focuses last text block
    this.container.addEventListener('click', e => {
      if (e.target === this.container) this._focusLastText();
    });
  }

  // ── Public API ──────────────────────────────────────────────────────────────
  setBlocks(raw) {
    this.blocks = raw.map(b => ({ ...b, id: this._id() }));
    if (!this.blocks.length) this.blocks = [this._newTextBlock()];
    this._render();
  }

  getBlocks() {
    // sync live text from DOM
    this.blocks.forEach((b, i) => {
      if (b.type === 'text') {
        const el = this._elFor(b.id);
        if (el) b.content = el.innerText;
      }
    });
    return this.blocks.filter(b => b.type === 'image' || b.content !== '');
  }

  insertImageAfterFocused(url, width = 200) {
    const imgBlock  = { id: this._id(), type: 'image', url, width };
    const textBlock = { id: this._id(), type: 'text', content: '' };
    const after = this.lastFocusedIdx >= 0 ? this.lastFocusedIdx : this.blocks.length - 1;
    this.blocks.splice(after + 1, 0, imgBlock, textBlock);
    this._render();
    // focus the text block after the image
    setTimeout(() => {
      const el = this._elFor(textBlock.id);
      if (el) el.focus();
    }, 0);
    this.onChange();
  }

  clear() {
    this.blocks = [this._newTextBlock()];
    this._render();
  }

  focusFirst() {
    const first = this.container.querySelector('.block-text');
    if (first) first.focus();
  }

  // ── Internal ────────────────────────────────────────────────────────────────
  _newTextBlock(content = '') {
    return { id: this._id(), type: 'text', content };
  }

  _elFor(id) {
    return this.container.querySelector(`[data-bid="${id}"]`);
  }

  _render() {
    this.container.innerHTML = '';
    this.blocks.forEach((b, i) => {
      const el = b.type === 'text' ? this._renderText(b, i) : this._renderImage(b, i);
      this.container.appendChild(el);
    });
  }

  _renderText(b, i) {
    const div = document.createElement('div');
    div.className      = 'block-text';
    div.dataset.bid    = b.id;
    div.contentEditable = 'true';
    div.spellcheck     = true;
    if (i === 0) div.dataset.ph = 'Write something…';
    // use innerText to set, avoids HTML injection
    if (b.content) div.innerText = b.content;

    div.addEventListener('focus', () => {
      this.lastFocusedIdx = this.blocks.findIndex(x => x.id === b.id);
    });
    div.addEventListener('input', () => {
      b.content = div.innerText;
      this.onChange();
    });
    div.addEventListener('keydown', e => this._onTextKey(e, b));
    return div;
  }

  _onTextKey(e, b) {
    const idx = this.blocks.findIndex(x => x.id === b.id);
    const el  = this._elFor(b.id);

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      // capture text after cursor as content for new block
      const sel   = window.getSelection();
      const range = sel.getRangeAt(0);
      range.setEnd(el, el.childNodes.length);
      const after = range.toString();
      // trim current block
      range.setStart(el, 0);
      const before = range.cloneContents();
      // simple: just create empty block after
      const nb = this._newTextBlock('');
      this.blocks.splice(idx + 1, 0, nb);
      this._render();
      const nel = this._elFor(nb.id);
      if (nel) nel.focus();
      this.onChange();
      return;
    }

    if (e.key === 'Backspace') {
      const el2 = this._elFor(b.id);
      if ((el2 && el2.innerText === '') && this.blocks.length > 1) {
        e.preventDefault();
        this.blocks.splice(idx, 1);
        this._render();
        const prevIdx = Math.max(0, idx - 1);
        const prevEl  = this._elFor(this.blocks[prevIdx].id);
        if (prevEl && prevEl.contentEditable === 'true') {
          prevEl.focus();
          this._cursorToEnd(prevEl);
        }
        this.onChange();
      }
    }

    if (e.key === 'ArrowUp' && idx > 0) {
      const prev = this.blocks[idx - 1];
      if (prev.type === 'text') {
        const prevEl = this._elFor(prev.id);
        if (prevEl) { e.preventDefault(); prevEl.focus(); this._cursorToEnd(prevEl); }
      }
    }
    if (e.key === 'ArrowDown' && idx < this.blocks.length - 1) {
      const next = this.blocks[idx + 1];
      if (next.type === 'text') {
        const nextEl = this._elFor(next.id);
        if (nextEl) { e.preventDefault(); nextEl.focus(); }
      }
    }
  }

  _cursorToEnd(el) {
    const range = document.createRange();
    const sel   = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  _renderImage(b, i) {
    const wrap = document.createElement('div');
    wrap.className  = 'block-image';
    wrap.dataset.bid = b.id;

    const img = document.createElement('img');
    img.src    = b.url;
    img.alt    = 'note image';
    img.loading = 'lazy';
    img.style.width = (b.width || 200) + 'px';

    const ctrl = document.createElement('div');
    ctrl.className = 'block-image-controls';

    const mkBtn = (label, cls, fn) => {
      const btn = document.createElement('button');
      btn.className = 'img-ctrl-btn' + (cls ? ' ' + cls : '');
      btn.textContent = label;
      btn.title = label === '−' ? 'Shrink' : label === '+' ? 'Grow' : 'Remove';
      btn.addEventListener('click', fn);
      return btn;
    };

    ctrl.appendChild(mkBtn('+', '', () => {
      b.width = Math.min(900, (b.width || 200) + 80);
      img.style.width = b.width + 'px';
      this.onChange();
    }));
    ctrl.appendChild(mkBtn('−', '', () => {
      b.width = Math.max(60, (b.width || 200) - 80);
      img.style.width = b.width + 'px';
      this.onChange();
    }));
    ctrl.appendChild(mkBtn('×', 'remove', () => {
      const idx = this.blocks.findIndex(x => x.id === b.id);
      this.blocks.splice(idx, 1);
      if (!this.blocks.length) this.blocks.push(this._newTextBlock());
      this._render();
      this.onChange();
    }));

    wrap.appendChild(img);
    wrap.appendChild(ctrl);
    return wrap;
  }

  _focusLastText() {
    const texts = [...this.container.querySelectorAll('.block-text')];
    if (texts.length) { const last = texts[texts.length - 1]; last.focus(); this._cursorToEnd(last); }
  }
}

// ── SERIALIZATION ─────────────────────────────────────────────────────────────
// Body stored as JSON array of blocks.
// Legacy notes (plain text, possibly with ##IMG:url:width## markers) are migrated.

function parseBody(bodyStr, legacyImages) {
  if (!bodyStr && (!legacyImages || !legacyImages.length)) return [];
  // Try JSON first
  if (bodyStr && bodyStr.trimStart().startsWith('[')) {
    try { return JSON.parse(bodyStr); } catch(e) {}
  }
  // Legacy migration: parse ##IMG:url:width## markers
  const blocks = [];
  const parts  = (bodyStr || '').split(/(##IMG:[^#]+##)/);
  parts.forEach(part => {
    const m = part.match(/^##IMG:(.+):(\d*)##$/);
    if (m) {
      blocks.push({ type: 'image', url: m[1], width: parseInt(m[2]) || 200 });
    } else if (part) {
      // split on newlines → one text block per paragraph group
      const lines = part.split(/
{2,}/);
      lines.forEach(line => {
        const trimmed = line.trim();
        if (trimmed) blocks.push({ type: 'text', content: trimmed });
      });
    }
  });
  // Also append any legacy images array at end
  if (legacyImages && legacyImages.length) {
    legacyImages.forEach(url => blocks.push({ type: 'image', url, width: 200 }));
  }
  return blocks;
}

function serializeBody(blocks) {
  return JSON.stringify(blocks);
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let allNotes = [];
let activeId  = null;
let isDirty   = false;

// ── UI REFS ──────────────────────────────────────────────────────────────────
const notesList     = document.getElementById('notesList');
const sidebarEmpty  = document.getElementById('sidebarEmpty');
const editorEmpty   = document.getElementById('editorEmpty');
const editorInner   = document.getElementById('editorInner');
const noteTitle     = document.getElementById('noteTitle');
const noteMeta      = document.getElementById('noteMeta');
const saveBtn       = document.getElementById('saveBtn');
const savedTick     = document.getElementById('savedTick');
const uploadProgress = document.getElementById('uploadProgress');
const imgUploadBtn  = document.getElementById('imgUploadBtn');
const confirmOverlay = document.getElementById('confirmOverlay');
const sidebar       = document.getElementById('sidebar');
const blockEditorEl = document.getElementById('blockEditor');

const editor = new BlockEditor(blockEditorEl, () => { isDirty = true; });

noteTitle.addEventListener('input', () => { isDirty = true; });

// ── REAL-TIME SYNC ────────────────────────────────────────────────────────────
const q = query(collection(db, NOTES_COL), orderBy('updatedAt', 'desc'));
onSnapshot(q, snapshot => {
  snapshot.docChanges().forEach(change => {
    if (change.type === 'added' || change.type === 'modified') {
      const idx = allNotes.findIndex(n => n.id === change.doc.id);
      if (idx >= 0) allNotes[idx] = { id: change.doc.id, data: change.doc.data() };
      else allNotes.unshift({ id: change.doc.id, data: change.doc.data() });
    }
    if (change.type === 'removed') {
      allNotes = allNotes.filter(n => n.id !== change.doc.id);
      if (activeId === change.doc.id) closeEditor();
    }
  });
  allNotes.sort((a, b) => (b.data.updatedAt?.seconds ?? 0) - (a.data.updatedAt?.seconds ?? 0));
  renderList();
  if (activeId && !isDirty) {
    const active = allNotes.find(n => n.id === activeId);
    if (active) populateEditor(active);
  }
}, err => console.error('Firestore:', err));

// ── RENDER LIST ──────────────────────────────────────────────────────────────
function renderList() {
  Array.from(notesList.querySelectorAll('.note-item')).forEach(el => el.remove());
  sidebarEmpty.style.display = allNotes.length ? 'none' : '';
  allNotes.forEach(n => {
    const item = document.createElement('div');
    item.className = 'note-item' + (n.id === activeId ? ' active' : '');
    item.dataset.id = n.id;
    const titleText = n.data.title?.trim() || 'Untitled';
    let preview = '';
    try {
      const blocks = JSON.parse(n.data.body || '[]');
      preview = blocks.filter(b => b.type === 'text').map(b => b.content).join(' ').slice(0, 80);
    } catch(e) { preview = (n.data.body || '').replace(/##IMG[^#]+##/g, '[image]').slice(0, 80); }
    item.innerHTML = `
      <div class="note-item-title">${esc(titleText)}</div>
      <div class="note-item-meta">
        <span class="note-item-date">${fmtDate(n.data.updatedAt)}</span>
        <span class="note-item-author">${esc(n.data.author || '')}</span>
      </div>
      ${preview ? `<div class="note-item-preview">${esc(preview)}</div>` : ''}`;
    item.addEventListener('click', () => openNote(n.id));
    notesList.appendChild(item);
  });
}

// ── OPEN / CLOSE ──────────────────────────────────────────────────────────────
function openNote(id) {
  activeId = id; isDirty = false;
  const n = allNotes.find(n => n.id === id);
  if (!n) return;
  populateEditor(n);
  renderList();
  hideSidebarMobile();
}

function populateEditor(n) {
  const d = n.data;
  noteTitle.value = d.title || '';
  noteMeta.textContent = `${fmtDate(d.createdAt)} · ${d.author || ''}${d.updatedAt && d.updatedAt.seconds !== d.createdAt?.seconds ? ' · edited' : ''}`;
  const blocks = parseBody(d.body || '', Array.isArray(d.images) ? d.images : []);
  editor.setBlocks(blocks);
  editorEmpty.style.display = 'none';
  editorInner.classList.add('visible');
}

function closeEditor() {
  activeId = null; isDirty = false;
  editor.clear();
  editorInner.classList.remove('visible');
  editorEmpty.style.display = '';
  renderList();
}

// ── NEW NOTE ──────────────────────────────────────────────────────────────────
window.newNote = function() {
  activeId = null; isDirty = false;
  noteTitle.value = ''; noteMeta.textContent = '';
  editor.clear();
  renderList();
  editorEmpty.style.display = 'none';
  editorInner.classList.add('visible');
  noteTitle.focus();
  hideSidebarMobile();
};

// ── SAVE ─────────────────────────────────────────────────────────────────────
window.saveNote = async function() {
  const title  = noteTitle.value.trim();
  const blocks = editor.getBlocks();
  if (!title && !blocks.length) return;
  saveBtn.disabled = true;
  try {
    const payload = {
      title: title || 'Untitled',
      body:  serializeBody(blocks),
      images: [],
      author: currentUser,
      updatedAt: serverTimestamp()
    };
    if (activeId) {
      await updateDoc(doc(db, NOTES_COL, activeId), payload);
    } else {
      payload.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db, NOTES_COL), payload);
      activeId = ref.id;
    }
    isDirty = false;
    flashSaved();
  } catch(e) { console.error('Save failed', e); alert('Save failed: ' + e.message); }
  finally { saveBtn.disabled = false; }
};

function flashSaved() {
  savedTick.classList.add('show');
  setTimeout(() => savedTick.classList.remove('show'), 2000);
}

// ── DELETE ───────────────────────────────────────────────────────────────────
window.confirmDelete = function() { if (activeId) confirmOverlay.classList.add('open'); };
window.closeConfirm  = function() { confirmOverlay.classList.remove('open'); };
window.deleteNote    = async function() {
  if (!activeId) return;
  confirmOverlay.classList.remove('open');
  try { await deleteDoc(doc(db, NOTES_COL, activeId)); closeEditor(); }
  catch(e) { alert('Delete failed: ' + e.message); }
};

// ── IMAGE UPLOAD ──────────────────────────────────────────────────────────────
window.triggerImagePick = function() {
  document.getElementById('imgFileInput').click();
};

window.handleImagePick = async function(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  uploadProgress.classList.add('visible');
  imgUploadBtn.disabled = true;

  try {
    const base64 = await toBase64(file);
    const ext   = file.name.split('.').pop().split('?')[0];
    const fname = `notes-images/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;

    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/${fname}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28'
        },
        body: JSON.stringify({
          message: `Add note image ${Date.now()}`,
          content: base64,
          branch:  GITHUB_BRANCH
        })
      }
    );
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `GitHub API ${res.status}`); }
    const data   = await res.json();
    const rawUrl = data.content.download_url;
    editor.insertImageAfterFocused(rawUrl, 200);
    isDirty = true;
  } catch(e) {
    console.error('Upload failed', e);
    alert('Image upload failed: ' + e.message);
  } finally {
    uploadProgress.classList.remove('visible');
    imgUploadBtn.disabled = false;
  }
};

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  return d.toDateString() === now.toDateString()
    ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SIGN OUT ─────────────────────────────────────────────────────────────────
window.signOut = function() { sessionStorage.removeItem('notesUser'); window.location.replace('index.html'); };

// ── MOBILE ───────────────────────────────────────────────────────────────────
function hideSidebarMobile() { if (window.innerWidth <= 640) sidebar.classList.add('hidden-mobile'); }
function showSidebarMobile() { sidebar.classList.remove('hidden-mobile'); }
window.showSidebarMobile = showSidebarMobile;

// ── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (editorInner.classList.contains('visible')) saveNote();
  }
});
window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
</html>
